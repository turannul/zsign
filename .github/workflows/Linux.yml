name: Build & Test (Linux)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: |
        chmod +x INSTALL.sh
        ./INSTALL.sh

    - name: Test
      run: ctest

    - name: Add Files
      run: |
        git add .
        git commit -m "adding files"
        git push
